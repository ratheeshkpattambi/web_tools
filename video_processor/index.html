<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <title>Video Processor (Build #22)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <a href="/" class="home-link">
        <i class="fas fa-arrow-left"></i>
        Home
    </a>
    <h1>
        <i class="fas fa-film"></i>
        Video Processor
    </h1>
    <div class="file-input-container" id="dropZone">
        <i class="fas fa-cloud-upload-alt"></i>
        <div>Drag and drop a video file here</div>
        <div>- or -</div>
        <div class="upload-buttons">
            <button class="btn" onclick="document.getElementById('upload').click()">
                <i class="fas fa-folder-open"></i>
                Browse Files
            </button>
        </div>
        <input type="file" id="upload" accept="video/*">
    </div>
    <div class="controls">
        <button class="btn" onclick="processVideo()" id="processBtn" disabled>
            <i class="fas fa-cogs"></i>
            Process Video
        </button>
        <button class="btn" onclick="downloadVideo()" id="downloadBtn" disabled>
            <i class="fas fa-download"></i>
            Download
        </button>
    </div>
    <div class="preview">
        <h3>
            <i class="fas fa-eye"></i>
            Preview:
        </h3>
        <video id="output-video" controls></video>
    </div>
    <div id="debug-log" class="debug-log">
        <h3>
            <i class="fas fa-terminal"></i>
            Processing Log:
        </h3>
        <div id="log"></div>
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js" crossorigin="anonymous"></script>
    <script>
        // ... rest of the JavaScript remains the same ...
    </script>
</body>
</html>
